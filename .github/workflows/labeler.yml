name: Labeler

on: push

jobs:
    labeler:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v3
            - name: Run Labeler
              if: success()
              uses: crazy-max/ghaction-github-labeler@v4
              with:
                  yaml_file: .github/labels.yml
                  skip_delete: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
